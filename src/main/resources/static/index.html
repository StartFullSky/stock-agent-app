<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Agent - AI股票投资助手</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0d1117; --bg2: #161b22; --bg3: #21262d;
            --border: #30363d; --text: #e6edf3; --text2: #8b949e;
            --accent: #58a6ff; --green: #3fb950; --red: #f85149;
            --orange: #d29922; --purple: #bc8cff;
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; }
        .sidebar { width: 280px; background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; flex-shrink: 0; }
        .sidebar-header { padding: 14px; border-bottom: 1px solid var(--border); }
        .sidebar-header h2 { font-size: 13px; color: var(--text2); margin-bottom: 8px; }
        .new-chat-btn { width: 100%; padding: 7px; background: var(--accent); color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .history-list { flex: 1; overflow-y: auto; padding: 6px; }
        .history-item { padding: 8px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; color: var(--text2); margin-bottom: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .history-item:hover { background: var(--bg3); color: var(--text); }
        .sidebar-footer { padding: 10px; border-top: 1px solid var(--border); font-size: 10px; color: var(--text2); text-align: center; }
        .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
        .indices-bar { display: flex; gap: 10px; padding: 10px 16px; background: var(--bg2); border-bottom: 1px solid var(--border); overflow-x: auto; }
        .index-card { background: var(--bg3); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; min-width: 120px; flex-shrink: 0; cursor: pointer; transition: border-color 0.2s; }
        .index-card:hover { border-color: var(--accent); }
        .index-card .name { font-size: 11px; color: var(--text2); margin-bottom: 2px; }
        .index-card .price { font-size: 15px; font-weight: 700; margin-bottom: 1px; }
        .index-card .change { font-size: 11px; }
        .up { color: var(--red); } .down { color: var(--green); }
        .quick-bar { display: flex; gap: 6px; padding: 8px 16px; overflow-x: auto; }
        .quick-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 5px 12px; border-radius: 14px; cursor: pointer; font-size: 11px; white-space: nowrap; transition: all 0.2s; }
        .quick-btn:hover { background: var(--accent); border-color: var(--accent); color: #fff; }
        .chat-area { flex: 1; overflow-y: auto; padding: 16px; }
        .msg { display: flex; gap: 10px; margin-bottom: 16px; max-width: 85%; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
        .msg.user { margin-left: auto; flex-direction: row-reverse; }
        .msg-avatar { width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 13px; flex-shrink: 0; }
        .msg.user .msg-avatar { background: var(--purple); } .msg.ai .msg-avatar { background: var(--accent); }
        .msg-bubble { padding: 10px 14px; border-radius: 10px; font-size: 13px; line-height: 1.7; }
        .msg.user .msg-bubble { background: var(--purple); color: #fff; }
        .msg.ai .msg-bubble { background: var(--bg3); border: 1px solid var(--border); }
        .msg-bubble strong { color: var(--orange); }
        .msg-bubble code { background: rgba(0,0,0,0.3); padding: 1px 4px; border-radius: 3px; font-family: Consolas, monospace; font-size: 12px; }
        .msg-bubble table { border-collapse: collapse; width: 100%; margin: 6px 0; }
        .msg-bubble th, .msg-bubble td { border: 1px solid var(--border); padding: 4px 7px; font-size: 11px; }
        .msg-bubble th { background: rgba(88,166,255,0.12); }
        .typing { display: flex; gap: 3px; padding: 3px 0; }
        .typing span { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; animation: bounce 1.4s infinite; }
        .typing span:nth-child(2) { animation-delay: 0.2s; } .typing span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }
        .input-area { padding: 10px 16px; background: var(--bg2); border-top: 1px solid var(--border); }
        .input-row { display: flex; gap: 8px; align-items: flex-end; }
        .input-row textarea { flex: 1; background: var(--bg); border: 1px solid var(--border); color: var(--text); padding: 8px 12px; border-radius: 10px; font-size: 13px; resize: none; min-height: 38px; max-height: 100px; font-family: inherit; outline: none; }
        .input-row textarea:focus { border-color: var(--accent); }
        .send-btn { background: var(--accent); border: none; color: #fff; width: 38px; height: 38px; border-radius: 10px; cursor: pointer; font-size: 15px; flex-shrink: 0; }
        .send-btn:disabled { opacity: 0.4; }
        .welcome { text-align: center; padding: 40px 16px; }
        .welcome h2 { font-size: 24px; margin-bottom: 6px; } .welcome p { color: var(--text2); margin-bottom: 24px; font-size: 13px; }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 10px; max-width: 560px; margin: 0 auto; }
        .feat { background: var(--bg2); border: 1px solid var(--border); padding: 14px; border-radius: 10px; cursor: pointer; text-align: left; transition: all 0.2s; }
        .feat:hover { border-color: var(--accent); transform: translateY(-2px); }
        .feat .icon { font-size: 22px; margin-bottom: 6px; } .feat h3 { font-size: 12px; margin-bottom: 3px; } .feat p { font-size: 10px; color: var(--text2); margin: 0; }
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); z-index: 100; align-items: center; justify-content: center; }
        .modal-overlay.show { display: flex; }
        .modal { background: var(--bg2); border: 1px solid var(--border); border-radius: 12px; width: 90%; max-width: 900px; max-height: 85vh; overflow: hidden; display: flex; flex-direction: column; }
        .modal-header { padding: 10px 16px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-header h3 { font-size: 14px; }
        .modal-close { background: none; border: none; color: var(--text2); font-size: 18px; cursor: pointer; }
        .modal-body { flex: 1; padding: 12px; overflow-y: auto; }
        #klineChart { width: 100%; height: 450px; }
        @media (max-width: 768px) { .sidebar { display: none; } }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <h2>对话历史</h2>
            <button class="new-chat-btn" onclick="clearChat()">+ 新对话</button>
        </div>
        <div class="history-list" id="historyList"></div>
        <div class="sidebar-footer">Stock Agent v1.0 | MiMo v2.5 Pro</div>
    </div>
    <div class="main">
        <div class="indices-bar" id="indicesBar">加载中...</div>
        <div class="quick-bar">
            <button class="quick-btn" onclick="send('上证指数多少点')">大盘指数</button>
            <button class="quick-btn" onclick="send('最近有什么财经新闻')">财经新闻</button>
            <button class="quick-btn" onclick="send('茅台现在什么价')">实时行情</button>
            <button class="quick-btn" onclick="send('搜一下半导体行业')">Web搜索</button>
            <button class="quick-btn" onclick="send('查一下茅台最近一个月K线数据')">历史K线</button>
            <button class="quick-btn" onclick="send('分析一下我的交易习惯')">交易复盘</button>
            <button class="quick-btn" onclick="send('用MA5和MA20回测茅台')">策略回测</button>
            <button class="quick-btn" onclick="send('帮我搜索特斯拉')">搜股票</button>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="welcome" id="welcome">
                <h2>Stock Agent</h2>
                <p>AI股票投资助手，支持A股/美股/港股/指数</p>
                <div class="features">
                    <div class="feat" onclick="send('上证指数多少点')"><div class="icon">📊</div><h3>大盘指数</h3><p>上证/深证/创业板/纳斯达克</p></div>
                    <div class="feat" onclick="send('茅台现在什么价')"><div class="icon">📈</div><h3>实时行情</h3><p>A股/美股/港股实时价格</p></div>
                    <div class="feat" onclick="send('查一下茅台最近一个月K线')"><div class="icon">📉</div><h3>历史K线</h3><p>查询历史走势数据</p></div>
                    <div class="feat" onclick="send('用双均线策略回测宁德时代')"><div class="icon">🎯</div><h3>策略回测</h3><p>验证交易策略历史表现</p></div>
                </div>
            </div>
        </div>
        <div class="input-area">
            <div class="input-row">
                <textarea id="input" placeholder="输入你的问题... (Enter发送)" rows="1"></textarea>
                <button class="send-btn" id="sendBtn" onclick="doSend()">➤</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="klineModal">
        <div class="modal">
            <div class="modal-header">
                <h3 id="klineTitle">K线图</h3>
                <button class="modal-close" onclick="closeModal()">✕</button>
            </div>
            <div class="modal-body"><div id="klineChart"></div></div>
        </div>
    </div>
    <script>
        const chatArea = document.getElementById('chatArea');
        const input = document.getElementById('input');
        const sendBtn = document.getElementById('sendBtn');
        const welcome = document.getElementById('welcome');
        let loading = false;

        window.onload = () => { loadIndices(); loadHistory(); input.focus(); };

        async function loadIndices() {
            try {
                const res = await fetch('/api/stock/indices');
                const data = await res.json();
                if (!data.success || !data.data.length) {
                    document.getElementById('indicesBar').innerHTML = '<span style="color:var(--text2)">指数加载中...</span>';
                    return;
                }
                document.getElementById('indicesBar').innerHTML = data.data.map(idx => {
                    const rate = parseFloat(idx.changeRate) || 0;
                    const cls = rate >= 0 ? 'up' : 'down';
                    const arrow = rate >= 0 ? '▲' : '▼';
                    return '<div class="index-card" onclick="send(\'' + idx.name + '今天怎么样\')">' +
                        '<div class="name">' + idx.name + '</div>' +
                        '<div class="price ' + cls + '">' + idx.price + '</div>' +
                        '<div class="change ' + cls + '">' + arrow + ' ' + rate.toFixed(2) + '%</div></div>';
                }).join('');
            } catch(e) {
                document.getElementById('indicesBar').innerHTML = '<span style="color:var(--text2)">指数加载失败</span>';
            }
        }

        async function loadHistory() {
            try {
                const res = await fetch('/api/chat/history?limit=50');
                const data = await res.json();
                if (!data.success || !data.data.length) return;
                if (welcome) welcome.style.display = 'none';
                data.data.forEach(msg => appendMsg(msg.role, msg.content, false));
                scrollToBottom();
                updateHistoryList(data.data);
            } catch(e) {}
        }

        function updateHistoryList(messages) {
            const userMsgs = messages.filter(m => m.role === 'user');
            document.getElementById('historyList').innerHTML = userMsgs.slice(-20).reverse().map(m => {
                const text = m.content.substring(0, 25) + (m.content.length > 25 ? '...' : '');
                return '<div class="history-item" onclick="send(\'' + m.content.replace(/'/g, "\\'").replace(/\n/g, ' ') + '\')">' + text + '</div>';
            }).join('');
        }

        async function clearChat() {
            if (!confirm('确定清空所有对话记录？')) return;
            await fetch('/api/chat/history', { method: 'DELETE' });
            chatArea.innerHTML = '';
            if (welcome) { welcome.style.display = ''; chatArea.appendChild(welcome); }
            document.getElementById('historyList').innerHTML = '';
        }

        input.addEventListener('keydown', e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doSend(); } });
        input.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 100) + 'px'; });

        function send(text) { input.value = text; doSend(); }

        async function doSend() {
            const msg = input.value.trim();
            if (!msg || loading) return;
            if (welcome) welcome.style.display = 'none';
            appendMsg('user', msg);
            input.value = ''; input.style.height = 'auto';
            loading = true; sendBtn.disabled = true;
            const loadEl = appendLoading();
            try {
                const res = await fetch('/api/chat', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ message: msg }) });
                const data = await res.json();
                loadEl.remove();
                if (data.success) { appendMsg('ai', data.data); checkForKline(msg, data.data); }
                else { appendMsg('ai', '❌ ' + (data.message || '请求失败')); }
            } catch(e) { loadEl.remove(); appendMsg('ai', '❌ 网络错误: ' + e.message); }
            finally { loading = false; sendBtn.disabled = false; input.focus(); }
        }

        function appendMsg(role, content, scroll) {
            const div = document.createElement('div');
            div.className = 'msg ' + role;
            div.innerHTML = '<div class="msg-avatar">' + (role === 'user' ? '👤' : '🤖') + '</div><div class="msg-bubble">' + formatContent(content) + '</div>';
            chatArea.appendChild(div);
            if (scroll !== false) scrollToBottom();
        }

        function appendLoading() {
            const div = document.createElement('div');
            div.className = 'msg ai';
            div.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
            chatArea.appendChild(div); scrollToBottom(); return div;
        }

        function formatContent(t) {
            t = t.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            t = t.replace(/`(.*?)`/g, '<code>$1</code>');
            t = t.replace(/\n/g, '<br>');
            return t;
        }

        function scrollToBottom() { chatArea.scrollTop = chatArea.scrollHeight; }

        function checkForKline(q, a) {
            if (a.includes('历史K线') && a.includes('|')) {
                const m = q.match(/(\d{6}|[A-Z]{1,5})/);
                if (m) showKlineModal(m[1]);
            }
        }

        async function showKlineModal(code) {
            const end = new Date().toISOString().split('T')[0];
            const start = new Date(Date.now() - 90*86400000).toISOString().split('T')[0];
            try {
                const res = await fetch('/api/stock/kline?code=' + code + '&startDate=' + start + '&endDate=' + end + '&limit=90');
                const data = await res.json();
                if (!data.success || !data.data.length) return;
                renderKlineChart(code, data.data);
                document.getElementById('klineModal').classList.add('show');
            } catch(e) {}
        }

        function renderKlineChart(code, klines) {
            document.getElementById('klineTitle').textContent = code + ' K线图';
            const chart = echarts.init(document.getElementById('klineChart'));
            chart.setOption({
                backgroundColor: '#161b22',
                tooltip: { trigger: 'axis', axisPointer: { type: 'cross' } },
                xAxis: { type: 'category', data: klines.map(k=>k.date), axisLine:{lineStyle:{color:'#30363d'}}, axisLabel:{color:'#8b949e',fontSize:10} },
                yAxis: { type: 'value', scale: true, splitLine:{lineStyle:{color:'#21262d'}}, axisLabel:{color:'#8b949e'} },
                series: [{ type: 'candlestick', data: klines.map(k=>[+k.open,+k.close,+k.low,+k.high]),
                    itemStyle: { color:'#f85149', color0:'#3fb950', borderColor:'#f85149', borderColor0:'#3fb950' } }],
                dataZoom: [{ type: 'inside', start: 0, end: 100 }]
            });
            window.addEventListener('resize', () => chart.resize());
        }

        function closeModal() { document.getElementById('klineModal').classList.remove('show'); }
        document.getElementById('klineModal').addEventListener('click', e => { if (e.target.classList.contains('modal-overlay')) closeModal(); });
    </script>
</body>
</html>
