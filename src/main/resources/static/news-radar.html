<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>资讯雷达 - Stock Agent</title>
    <link rel="stylesheet" href="/css/dark-theme.css">
    <style>
        .search-bar { display:flex; gap:10px; margin-bottom:20px; }
        .search-bar .input { flex:1; }
        .category-tabs { display:flex; gap:4px; flex-wrap:wrap; margin-bottom:16px; }
        .category-tab { padding:6px 14px; border-radius:14px; font-size:12px; cursor:pointer; background:var(--bg3); border:1px solid var(--border); color:var(--text2); transition:all 0.2s; }
        .category-tab:hover { border-color:var(--accent); }
        .category-tab.active { background:var(--accent); color:#fff; border-color:var(--accent); }
        .news-list { max-height:70vh; overflow-y:auto; }
        .news-item { padding:14px; border-bottom:1px solid var(--border); cursor:pointer; transition:background 0.2s; }
        .news-item:hover { background:var(--bg3); }
        .news-item:last-child { border-bottom:none; }
        .news-title { font-size:14px; font-weight:500; color:var(--text); margin-bottom:6px; line-height:1.5; }
        .news-summary { font-size:12px; color:var(--text2); margin-bottom:6px; line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .news-meta { display:flex; gap:12px; font-size:11px; color:var(--text2); }
        .news-source { color:var(--accent); }
        .two-col { display:grid; grid-template-columns:2fr 1fr; gap:16px; }
        .sidebar-card { position:sticky; top:60px; }
        .category-section { margin-bottom:16px; }
        .category-title { font-size:13px; font-weight:600; color:var(--accent); margin-bottom:8px; padding-bottom:6px; border-bottom:1px solid var(--border); }
        .mini-news { padding:6px 0; font-size:12px; cursor:pointer; }
        .mini-news:hover { color:var(--accent); }
        @media (max-width:768px) { .two-col { grid-template-columns:1fr; } }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="/" class="nav-brand">📈 Stock Agent</a>
        <div class="nav-links">
            <a href="/" class="nav-link">AI Chat</a>
            <a href="/dashboard.html" class="nav-link">每日复盘</a>
            <a href="/watchlist.html" class="nav-link">自选股</a>
            <a href="/portfolio.html" class="nav-link">持仓</a>
            <a href="/news-radar.html" class="nav-link active">资讯雷达</a>
        </div>
    </nav>

    <div class="page">
        <div class="page-header">
            <h1 class="page-title">📡 资讯雷达</h1>
            <p class="page-desc">实时财经资讯，AI 帮你快速掌握市场动态</p>
        </div>

        <div class="search-bar">
            <input type="text" class="input" id="searchInput" placeholder="搜索新闻关键词..." onkeydown="if(event.key==='Enter')searchNews()">
            <button class="btn btn-primary" onclick="searchNews()">搜索</button>
            <button class="btn" onclick="loadLatest()">最新</button>
        </div>

        <div class="category-tabs" id="categoryTabs">
            <span class="category-tab active" onclick="filterCategory('all')">全部</span>
            <span class="category-tab" onclick="filterCategory('大盘')">大盘</span>
            <span class="category-tab" onclick="filterCategory('政策')">政策</span>
            <span class="category-tab" onclick="filterCategory('行业')">行业</span>
            <span class="category-tab" onclick="filterCategory('个股')">个股</span>
            <span class="category-tab" onclick="filterCategory('国际')">国际</span>
        </div>

        <div class="two-col">
            <div class="card">
                <div class="card-header">
                    <span class="card-title" id="listTitle">最新资讯</span>
                    <button class="btn btn-sm" onclick="loadLatest()">刷新</button>
                </div>
                <div class="news-list" id="newsList">
                    <div class="loading">加载中...</div>
                </div>
            </div>

            <div>
                <div class="card sidebar-card">
                    <div class="card-header">
                        <span class="card-title">分类速览</span>
                    </div>
                    <div id="categorySidebar">
                        <div class="loading">加载中...</div>
                    </div>
                </div>

                <div class="card sidebar-card" style="margin-top:16px">
                    <div class="card-header">
                        <span class="card-title">AI 资讯摘要</span>
                        <button class="btn btn-sm btn-primary" id="aiBtn" onclick="loadAiSummary()">生成</button>
                    </div>
                    <div id="aiSummary" style="font-size:12px;color:var(--text2);min-height:60px">
                        点击生成按钮，AI 将为你总结今日要闻
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
var currentCategory = 'all';
var allNews = [];

window.onload = function() { loadAll(); };

function loadAll() {
    loadLatest();
    loadCategories();
}

function loadLatest() {
    document.getElementById('listTitle').textContent = '最新资讯';
    fetch('/api/news/latest?limit=30').then(r=>r.json()).then(data=>{
        if(data.success) {
            allNews = data.data||[];
            renderNews(allNews);
        }
    }).catch(e=>{
        document.getElementById('newsList').innerHTML = '<div class="empty-state">加载失败</div>';
    });
}

function searchNews() {
    var keyword = document.getElementById('searchInput').value.trim();
    if(!keyword) { loadLatest(); return; }
    document.getElementById('listTitle').textContent = '搜索: '+keyword;
    fetch('/api/news/search?keyword='+encodeURIComponent(keyword)+'&limit=30').then(r=>r.json()).then(data=>{
        if(data.success) renderNews(data.data||[]);
    });
}

function filterCategory(cat) {
    currentCategory = cat;
    document.querySelectorAll('.category-tab').forEach(t=>t.classList.remove('active'));
    event.target.classList.add('active');
    if(cat==='all') {
        renderNews(allNews);
    } else {
        // Filter from allNews or fetch new
        fetch('/api/news/search?keyword='+encodeURIComponent(cat)+'&limit=20').then(r=>r.json()).then(data=>{
            if(data.success) renderNews(data.data||[]);
        });
    }
}

function renderNews(news) {
    if(!news||!news.length) {
        document.getElementById('newsList').innerHTML = '<div class="empty-state">暂无新闻</div>';
        return;
    }
    document.getElementById('newsList').innerHTML = news.map(n=>
        '<div class="news-item" onclick="openNews(\''+encodeURIComponent(n.url||'')+'\')">'+
            '<div class="news-title">'+(n.title||'')+'</div>'+
            (n.summary?'<div class="news-summary">'+n.summary+'</div>':'')+
            '<div class="news-meta">'+
                (n.source?'<span class="news-source">'+n.source+'</span>':'')+
                (n.time?'<span>'+n.time+'</span>':'')+
                (n.category?'<span>#'+n.category+'</span>':'')+
            '</div>'+
        '</div>'
    ).join('');
}

function loadCategories() {
    fetch('/api/news/categories').then(r=>r.json()).then(data=>{
        if(data.success) renderCategorySidebar(data.data);
    });
}

function renderCategorySidebar(cats) {
    if(!cats||!Object.keys(cats).length) {
        document.getElementById('categorySidebar').innerHTML = '<div class="empty-state">暂无数据</div>';
        return;
    }
    var html = '';
    for(var cat in cats) {
        html += '<div class="category-section"><div class="category-title">'+cat+'</div>';
        cats[cat].forEach(n=>{
            html += '<div class="mini-news" onclick="openNews(\''+encodeURIComponent(n.url||'')+'\')">'+n.title+'</div>';
        });
        html += '</div>';
    }
    document.getElementById('categorySidebar').innerHTML = html;
}

function loadAiSummary() {
    var btn = document.getElementById('aiBtn');
    var div = document.getElementById('aiSummary');
    btn.disabled = true; btn.textContent = '生成中...';
    div.innerHTML = '<div class="loading">AI 正在整理资讯...</div>';

    fetch('/api/news/summary').then(r=>r.json()).then(data=>{
        if(data.success&&data.data) {
            fetch('/api/chat/stream',{
                method:'POST',
                headers:{'Content-Type':'application/json'},
                body:JSON.stringify({message:'请用简洁的语言总结以下财经资讯，提炼3-5个要点，并分析对A股可能的影响：\n\n'+data.data})
            }).then(res=>{
                var reader = res.body.getReader();
                var decoder = new TextDecoder();
                var fullText = '';
                function read() {
                    return reader.read().then(result=>{
                        if(result.done) { btn.disabled=false; btn.textContent='生成'; return; }
                        var chunk = decoder.decode(result.value,{stream:true});
                        chunk.split('\n').forEach(line=>{
                            if(line.indexOf('data:')===0) {
                                fullText += line.substring(5);
                                div.innerHTML = fullText.replace(/\n/g,'<br>');
                            }
                        });
                        return read();
                    });
                }
                return read();
            }).catch(e=>{ div.innerHTML='生成失败'; btn.disabled=false; btn.textContent='生成'; });
        }
    }).catch(e=>{ div.innerHTML='获取资讯失败'; btn.disabled=false; btn.textContent='生成'; });
}

function openNews(url) {
    if(url) window.open(decodeURIComponent(url),'_blank');
}
    </script>
</body>
</html>
