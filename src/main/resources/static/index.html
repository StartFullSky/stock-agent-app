<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Agent - AI股票投资助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #1a1a2e;
            --bg-secondary: #16213e;
            --bg-chat: #0f3460;
            --accent: #e94560;
            --accent-hover: #ff6b81;
            --text-primary: #eee;
            --text-secondary: #a0a0b0;
            --user-bubble: #533483;
            --ai-bubble: #1a1a3e;
            --border: #2a2a4a;
            --success: #2ed573;
            --warning: #ffa502;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* ===== 顶部导航 ===== */
        .header {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
            padding: 12px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
        }

        .header-title h1 {
            font-size: 16px;
            font-weight: 600;
        }

        .header-title p {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .model-badge {
            background: var(--bg-chat);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            color: var(--accent);
            border: 1px solid var(--accent);
        }

        /* ===== 快捷操作 ===== */
        .quick-actions {
            padding: 12px 24px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            background: var(--bg-primary);
        }

        .quick-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            white-space: nowrap;
            transition: all 0.2s;
        }

        .quick-btn:hover {
            background: var(--accent);
            border-color: var(--accent);
        }

        /* ===== 聊天区域 ===== */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .message-avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .message.user .message-avatar {
            background: var(--user-bubble);
        }

        .message.ai .message-avatar {
            background: linear-gradient(135deg, var(--accent), #533483);
        }

        .message-content {
            background: var(--ai-bubble);
            padding: 14px 18px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 14px;
            border: 1px solid var(--border);
        }

        .message.user .message-content {
            background: var(--user-bubble);
            border: none;
        }

        .message-content p { margin-bottom: 8px; }
        .message-content p:last-child { margin-bottom: 0; }
        .message-content strong { color: var(--accent-hover); }
        .message-content code {
            background: rgba(0,0,0,0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Consolas', monospace;
            font-size: 13px;
        }
        .message-content pre {
            background: rgba(0,0,0,0.3);
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }
        .message-content table {
            border-collapse: collapse;
            width: 100%;
            margin: 8px 0;
        }
        .message-content th, .message-content td {
            border: 1px solid var(--border);
            padding: 6px 10px;
            text-align: left;
            font-size: 13px;
        }
        .message-content th {
            background: rgba(233, 69, 96, 0.2);
        }

        /* ===== 加载动画 ===== */
        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 8px 0;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: var(--accent);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: 0s; }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        /* ===== 输入区域 ===== */
        .input-area {
            padding: 16px 24px;
            background: var(--bg-secondary);
            border-top: 1px solid var(--border);
        }

        .input-wrapper {
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }

        .input-wrapper textarea {
            flex: 1;
            background: var(--bg-primary);
            border: 1px solid var(--border);
            color: var(--text-primary);
            padding: 12px 16px;
            border-radius: 12px;
            font-size: 14px;
            resize: none;
            min-height: 44px;
            max-height: 120px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .input-wrapper textarea:focus {
            border-color: var(--accent);
        }

        .input-wrapper textarea::placeholder {
            color: var(--text-secondary);
        }

        .send-btn {
            background: var(--accent);
            border: none;
            color: white;
            width: 44px;
            height: 44px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            flex-shrink: 0;
        }

        .send-btn:hover {
            background: var(--accent-hover);
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* ===== 欢迎信息 ===== */
        .welcome {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .welcome h2 {
            font-size: 24px;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .welcome p {
            font-size: 14px;
            margin-bottom: 24px;
        }

        .welcome-features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            max-width: 600px;
            margin: 0 auto;
        }

        .feature-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            padding: 16px;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .feature-card:hover {
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        .feature-card .icon {
            font-size: 24px;
            margin-bottom: 8px;
        }

        .feature-card h3 {
            font-size: 14px;
            margin-bottom: 4px;
        }

        .feature-card p {
            font-size: 12px;
            color: var(--text-secondary);
            margin: 0;
        }

        /* ===== 响应式 ===== */
        @media (max-width: 600px) {
            .header { padding: 10px 16px; }
            .quick-actions { padding: 8px 16px; }
            .chat-container { padding: 12px 16px; }
            .input-area { padding: 12px 16px; }
            .message { max-width: 95%; }
        }
    </style>
</head>
<body>

    <!-- 顶部导航 -->
    <div class="header">
        <div class="header-left">
            <div class="logo">📈</div>
            <div class="header-title">
                <h1>Stock Agent</h1>
                <p>AI股票投资助手</p>
            </div>
        </div>
        <div class="model-badge">MiMo v2.5 Pro</div>
    </div>

    <!-- 快捷操作 -->
    <div class="quick-actions">
        <button class="quick-btn" onclick="sendQuick('最近有什么财经新闻？')">📰 财经新闻</button>
        <button class="quick-btn" onclick="sendQuick('600519茅台现在什么价？')">📊 实时行情</button>
        <button class="quick-btn" onclick="sendQuick('搜一下半导体行业最新消息')">🔍 Web搜索</button>
        <button class="quick-btn" onclick="sendQuick('分析一下我的交易习惯')">📋 交易复盘</button>
        <button class="quick-btn" onclick="sendQuick('用MA5和MA20回测茅台')">📈 策略回测</button>
        <button class="quick-btn" onclick="sendQuick('帮我搜索比亚迪的股票代码')">🔎 搜股票</button>
    </div>

    <!-- 聊天区域 -->
    <div class="chat-container" id="chatContainer">
        <div class="welcome" id="welcome">
            <h2>👋 你好，我是 Stock Agent</h2>
            <p>你的AI股票投资助手，可以帮你查行情、看新闻、分析交易、回测策略</p>
            <div class="welcome-features">
                <div class="feature-card" onclick="sendQuick('最近有什么重大财经新闻？')">
                    <div class="icon">📰</div>
                    <h3>财经新闻</h3>
                    <p>实时获取市场快讯和公司新闻</p>
                </div>
                <div class="feature-card" onclick="sendQuick('查询贵州茅台的实时行情')">
                    <div class="icon">📊</div>
                    <h3>实时行情</h3>
                    <p>A股实时价格、涨跌幅、成交量</p>
                </div>
                <div class="feature-card" onclick="sendQuick('分析我的交易行为，给出改进建议')">
                    <div class="icon">📋</div>
                    <h3>交易复盘</h3>
                    <p>分析胜率、频率、盈亏诊断</p>
                </div>
                <div class="feature-card" onclick="sendQuick('用双均线策略回测宁德时代')">
                    <div class="icon">📈</div>
                    <h3>策略回测</h3>
                    <p>验证交易策略的历史表现</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 输入区域 -->
    <div class="input-area">
        <div class="input-wrapper">
            <textarea id="userInput" placeholder="输入你的问题... (Enter发送, Shift+Enter换行)" rows="1"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
        </div>
    </div>

    <script>
        const chatContainer = document.getElementById('chatContainer');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const welcome = document.getElementById('welcome');
        let isLoading = false;

        // 自动调整输入框高度
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        });

        // Enter发送, Shift+Enter换行
        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        function sendQuick(text) {
            userInput.value = text;
            sendMessage();
        }

        async function sendMessage() {
            const message = userInput.value.trim();
            if (!message || isLoading) return;

            // 隐藏欢迎信息
            if (welcome) welcome.style.display = 'none';

            // 添加用户消息
            appendMessage('user', message);
            userInput.value = '';
            userInput.style.height = 'auto';

            // 显示加载
            isLoading = true;
            sendBtn.disabled = true;
            const loadingEl = appendLoading();

            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: message })
                });

                const data = await response.json();
                loadingEl.remove();

                if (data.success) {
                    appendMessage('ai', data.data);
                } else {
                    appendMessage('ai', '❌ 错误: ' + (data.message || '请求失败'));
                }
            } catch (error) {
                loadingEl.remove();
                appendMessage('ai', '❌ 网络错误: ' + error.message);
            } finally {
                isLoading = false;
                sendBtn.disabled = false;
                userInput.focus();
            }
        }

        function appendMessage(role, content) {
            const div = document.createElement('div');
            div.className = `message ${role}`;
            
            const avatar = document.createElement('div');
            avatar.className = 'message-avatar';
            avatar.textContent = role === 'user' ? '👤' : '🤖';
            
            const contentDiv = document.createElement('div');
            contentDiv.className = 'message-content';
            contentDiv.innerHTML = formatContent(content);
            
            div.appendChild(avatar);
            div.appendChild(contentDiv);
            chatContainer.appendChild(div);
            scrollToBottom();
        }

        function appendLoading() {
            const div = document.createElement('div');
            div.className = 'message ai';
            div.innerHTML = `
                <div class="message-avatar">🤖</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatContainer.appendChild(div);
            scrollToBottom();
            return div;
        }

        function formatContent(text) {
            // 简单的Markdown格式化
            text = text.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            text = text.replace(/`(.*?)`/g, '<code>$1</code>');
            text = text.replace(/\n/g, '<br>');
            return text;
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        // 页面加载后聚焦输入框
        userInput.focus();
    </script>
</body>
</html>
