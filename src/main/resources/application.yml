server:
  port: ${SERVER_PORT:9090}

spring:
  application:
    name: stock-agent-app
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:stock_agent}?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 3000ms

mybatis-plus:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

# AI模型配置（从环境变量读取）
ai:
  api-key: ${AI_API_KEY:your_api_key_here}
  model: ${AI_MODEL:mimo-v2.5-pro}
  base-url: ${AI_BASE_URL:https://token-plan-cn.xiaomimimo.com/v1}
  memory:
    max-messages: 50

# 行情缓存配置（秒）
cache:
  quote-ttl: 10
  kline-ttl: 3600
  search-ttl: 600

# 禁用LangChain4j自动配置
langchain4j:
  open-ai:
    chat-model:
      enabled: false

logging:
  level:
    com.stockagent: info