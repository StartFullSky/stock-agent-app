<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>📈</text></svg>">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Agent - AI股票投资助手</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{--bg:#0d1117;--bg2:#161b22;--bg3:#21262d;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--accent:#58a6ff;--green:#3fb950;--red:#f85149;--orange:#d29922;--purple:#bc8cff}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);height:100vh;display:flex}
        .sidebar{width:280px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
        .sidebar-tabs{display:flex;border-bottom:1px solid var(--border)}
        .sidebar-tab{flex:1;padding:10px;text-align:center;cursor:pointer;font-size:12px;color:var(--text2);border-bottom:2px solid transparent}
        .sidebar-tab.active{color:var(--accent);border-bottom-color:var(--accent)}
        .sidebar-content{flex:1;overflow-y:auto;padding:8px}
        .sidebar-header{padding:8px;border-bottom:1px solid var(--border)}
        .new-chat-btn{width:100%;padding:6px;background:var(--accent);color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:12px}
        .history-item,.fav-item{padding:8px 10px;border-radius:6px;cursor:pointer;font-size:12px;color:var(--text2);margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;justify-content:space-between;align-items:center}
        .history-item:hover,.fav-item:hover{background:var(--bg3);color:var(--text)}
        .fav-item .fav-info{flex:1;overflow:hidden}
        .fav-item .fav-price{font-size:11px;margin-top:2px}
        .fav-item .fav-del{color:var(--red);cursor:pointer;font-size:14px;padding:0 4px;opacity:0.6}
        .fav-item .fav-del:hover{opacity:1}
        .fav-add{display:flex;gap:4px;padding:8px}
        .fav-add input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:5px 8px;border-radius:4px;font-size:11px;outline:none}
        .fav-add input:focus{border-color:var(--accent)}
        .fav-add button{background:var(--accent);color:#fff;border:none;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:11px}
        .sidebar-footer{padding:8px;border-top:1px solid var(--border);font-size:10px;color:var(--text2);text-align:center}
        .main{flex:1;display:flex;flex-direction:column;min-width:0}
        .indices-bar{display:flex;gap:8px;padding:8px 16px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto}
        .index-card{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:6px 12px;min-width:110px;flex-shrink:0;cursor:pointer;transition:border-color .2s}
        .index-card:hover{border-color:var(--accent)}
        .index-card .name{font-size:10px;color:var(--text2);margin-bottom:1px}
        .index-card .price{font-size:14px;font-weight:700}
        .index-card .change{font-size:10px}
        .up{color:var(--red)}.down{color:var(--green)}
        .quick-bar{display:flex;gap:6px;padding:6px 16px;overflow-x:auto}
        .quick-btn{background:var(--bg3);border:1px solid var(--border);color:var(--text);padding:4px 10px;border-radius:12px;cursor:pointer;font-size:11px;white-space:nowrap;transition:all .2s}
        .quick-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff}
        .chat-area{flex:1;overflow-y:auto;padding:16px}
        .msg{display:flex;gap:10px;margin-bottom:16px;max-width:88%;animation:fadeIn .3s}
        @keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
        .msg.user{margin-left:auto;flex-direction:row-reverse}
        .msg-avatar{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
        .msg.user .msg-avatar{background:var(--purple)}.msg.ai .msg-avatar{background:var(--accent)}
        .msg-bubble{padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.7;overflow-x:auto}
        .msg.user .msg-bubble{background:var(--purple);color:#fff}
        .msg.ai .msg-bubble{background:var(--bg3);border:1px solid var(--border)}
        .msg-bubble p{margin:0 0 8px}.msg-bubble p:last-child{margin-bottom:0}
        .msg-bubble h1,.msg-bubble h2,.msg-bubble h3{margin:10px 0 6px;color:var(--accent)}
        .msg-bubble strong{color:var(--orange)}
        .msg-bubble code{background:rgba(0,0,0,.3);padding:1px 5px;border-radius:3px;font-family:Consolas,monospace;font-size:12px}
        .msg-bubble pre{background:rgba(0,0,0,.3);padding:10px;border-radius:6px;overflow-x:auto;margin:6px 0}
        .msg-bubble pre code{background:none;padding:0}
        .msg-bubble table{border-collapse:collapse;width:100%;margin:6px 0}
        .msg-bubble th,.msg-bubble td{border:1px solid var(--border);padding:4px 8px;font-size:12px;text-align:left}
        .msg-bubble th{background:rgba(88,166,255,.12);font-weight:600}
        .msg-bubble ul,.msg-bubble ol{margin:4px 0;padding-left:20px}
        .msg-bubble li{margin-bottom:2px}
        .msg-bubble blockquote{border-left:3px solid var(--accent);padding-left:10px;margin:6px 0;color:var(--text2)}
        .msg-bubble hr{border:none;border-top:1px solid var(--border);margin:8px 0}
        .msg-bubble a{color:var(--accent);text-decoration:none}
        .typing{display:flex;gap:3px;padding:3px 0}
        .typing span{width:5px;height:5px;background:var(--accent);border-radius:50%;animation:bounce 1.4s infinite}
        .typing span:nth-child(2){animation-delay:.2s}.typing span:nth-child(3){animation-delay:.4s}
        @keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
        .input-area{padding:10px 16px;background:var(--bg2);border-top:1px solid var(--border)}
        .input-row{display:flex;gap:8px;align-items:flex-end}
        .input-row textarea{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:10px;font-size:13px;resize:none;min-height:38px;max-height:100px;font-family:inherit;outline:none}
        .input-row textarea:focus{border-color:var(--accent)}
        .send-btn{background:var(--accent);border:none;color:#fff;width:38px;height:38px;border-radius:10px;cursor:pointer;font-size:15px;flex-shrink:0}
        .send-btn:disabled{opacity:.4}
        .welcome{text-align:center;padding:40px 16px}
        .welcome h2{font-size:24px;margin-bottom:6px}.welcome p{color:var(--text2);margin-bottom:24px;font-size:13px}
        .features{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;max-width:520px;margin:0 auto}
        .feat{background:var(--bg2);border:1px solid var(--border);padding:12px;border-radius:8px;cursor:pointer;text-align:left;transition:all .2s}
        .feat:hover{border-color:var(--accent);transform:translateY(-2px)}
        .feat .icon{font-size:20px;margin-bottom:4px}.feat h3{font-size:12px;margin-bottom:2px}.feat p{font-size:10px;color:var(--text2);margin:0}
        .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center}
        .modal-overlay.show{display:flex}
        .modal{background:var(--bg2);border:1px solid var(--border);border-radius:10px;width:90%;max-width:1000px;max-height:85vh;overflow:hidden;display:flex;flex-direction:column}
        .modal-header{padding:10px 16px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .modal-header h3{font-size:13px}.modal-close{background:none;border:none;color:var(--text2);font-size:18px;cursor:pointer}
        .modal-body{flex:1;padding:12px;overflow-y:auto}
        #klineChart{width:100%;height:500px}
        @media(max-width:768px){.sidebar{display:none}}
    .stream-cursor{display:inline-block;width:2px;height:14px;background:var(--accent);margin-left:2px;animation:blink 1s step-end infinite;vertical-align:middle}@keyframes blink{50%{opacity:0}}</style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-tabs">
            <div class="sidebar-tab active" onclick="switchTab('history')">History</div>
            <div class="sidebar-tab" onclick="switchTab('favorites')">Favorites</div>
        </div>
        <div class="sidebar-content" id="historyPanel">
            <div style="padding:8px"><button class="new-chat-btn" onclick="clearChat()">+ New Chat</button></div>
            <div id="historyList"></div>
        </div>
        <div class="sidebar-content" id="favoritesPanel" style="display:none">
            <div class="fav-add">
                <input type="text" id="favInput" placeholder="Stock code (600519/AAPL)" onkeydown="if(event.key==='Enter')addFavorite()">
                <button onclick="addFavorite()">+</button>
            </div>
            <div id="favList"></div>
        </div>
        <div class="sidebar-footer">Stock Agent v1.0 | MiMo v2.5 Pro</div>
    </div>
    <div class="main">
        <div class="indices-bar" id="indicesBar">Loading...</div>
        <div class="quick-bar">
            <button class="quick-btn" onclick="send('Shanghai Index')">Index</button>
            <button class="quick-btn" onclick="send('Latest financial news')">News</button>
            <button class="quick-btn" onclick="send('Moutai price now')">Quote</button>
            <button class="quick-btn" onclick="send('Search semiconductor')">Search</button>
            <button class="quick-btn" onclick="quickKline()">K-Line</button>
            <button class="quick-btn" onclick="send('Analyze my trading habits')">Review</button>
            <button class="quick-btn" onclick="send('Backtest MA5 MA20 on Moutai')">Backtest</button>
            <button class="quick-btn" onclick="send('Search Tesla')">Find Stock</button>
        </div>
        <div class="chat-area" id="chatArea">
            <div class="welcome" id="welcome">
                <h2>Stock Agent</h2>
                <p>AI Stock Assistant | A-Share / US / HK / Index</p>
                <div class="features">
                    <div class="feat" onclick="send('Shanghai Index today')"><div class="icon">&#128202;</div><h3>Index</h3><p>Shanghai / Shenzhen / NASDAQ</p></div>
                    <div class="feat" onclick="send('Moutai price')"><div class="icon">&#128200;</div><h3>Quote</h3><p>A-Share / US / HK</p></div>
                    <div class="feat" onclick="quickKline()"><div class="icon">&#128201;</div><h3>K-Line</h3><p>History with MA lines</p></div>
                    <div class="feat" onclick="send('Backtest MA strategy')"><div class="icon">&#127919;</div><h3>Backtest</h3><p>MA strategy validation</p></div>
                </div>
            </div>
        </div>
        <div class="input-area">
            <div class="input-row">
                <textarea id="input" placeholder="Ask me anything... (Enter to send)" rows="1"></textarea>
                <button class="send-btn" id="sendBtn" onclick="doSend()">&#10148;</button>
            </div>
        </div>
    </div>
    <div class="modal-overlay" id="klineModal">
        <div class="modal">
            <div class="modal-header"><h3 id="klineTitle">K-Line Chart</h3><button class="modal-close" onclick="closeModal()">&#10005;</button></div>
            <div class="modal-body"><div id="klineChart"></div></div>
        </div>
    </div>
    <script>
marked.setOptions({breaks:true,gfm:true});
var chatArea=document.getElementById('chatArea');
var input=document.getElementById('input');
var sendBtn=document.getElementById('sendBtn');
var welcome=document.getElementById('welcome');
var loading=false;
var currentTab='history';

window.onload=function(){loadIndices();loadHistory();loadFavorites();input.focus()};

// Tab switching
function switchTab(tab){
    currentTab=tab;
    document.querySelectorAll('.sidebar-tab').forEach(function(t){t.classList.remove('active')});
    if(tab==='history'){
        document.querySelector('.sidebar-tab:first-child').classList.add('active');
        document.getElementById('historyPanel').style.display='';
        document.getElementById('favoritesPanel').style.display='none';
    }else{
        document.querySelector('.sidebar-tab:last-child').classList.add('active');
        document.getElementById('historyPanel').style.display='none';
        document.getElementById('favoritesPanel').style.display='';
        loadFavorites();
    }
}

// Index
function loadIndices(){
    fetch('/api/stock/indices').then(function(r){return r.json()}).then(function(data){
        if(!data.success||!data.data.length){document.getElementById('indicesBar').innerHTML='<span style="color:var(--text2)">Loading indices...</span>';return}
        document.getElementById('indicesBar').innerHTML=data.data.map(function(idx){
            var rate=parseFloat(idx.changeRate)||0;
            var cls=rate>=0?'up':'down';
            var arrow=rate>=0?'&#9650;':'&#9660;';
            return '<div class="index-card" onclick="send(\''+idx.name+' today\')"><div class="name">'+idx.name+'</div><div class="price '+cls+'">'+idx.price+'</div><div class="change '+cls+'">'+arrow+' '+rate.toFixed(2)+'%</div></div>'
        }).join('')
    }).catch(function(){document.getElementById('indicesBar').innerHTML='<span style="color:var(--text2)">Index load failed</span>'})
}

// History
function loadHistory(){
    fetch('/api/chat/history?limit=50').then(function(r){return r.json()}).then(function(data){
        if(!data.success||!data.data.length)return;
        if(welcome)welcome.style.display='none';
        data.data.forEach(function(msg){appendMsg(msg.role,msg.content,false)});
        scrollToBottom();
        updateHistoryList(data.data)
    }).catch(function(){})
}
function updateHistoryList(messages){
    var userMsgs=messages.filter(function(m){return m.role==='user'});
    document.getElementById('historyList').innerHTML=userMsgs.slice(-20).reverse().map(function(m){
        var text=m.content.substring(0,25)+(m.content.length>25?'...':'');
        return '<div class="history-item" onclick="send(\''+m.content.replace(/'/g,"\\'").replace(/\n/g,' ')+'\')">'+text+'</div>'
    }).join('')
}
function clearChat(){
    if(!confirm('Clear all chat?'))return;
    fetch('/api/chat/history',{method:'DELETE'}).then(function(){
        chatArea.innerHTML='';
        if(welcome){welcome.style.display='';chatArea.appendChild(welcome)}
        document.getElementById('historyList').innerHTML=''
    })
}

// Favorites
function loadFavorites(){
    fetch('/api/favorite/list').then(function(r){return r.json()}).then(function(data){
        if(!data.success)return;
        renderFavorites(data.data||[])
    }).catch(function(){renderFavorites([])})
}
function renderFavorites(list){
    var html=list.map(function(f){
        var price=f.price?'<div class="fav-price">'+f.price+' '+((f.changeRate||0)>=0?'<span class="up">&#9650;':'<span class="down">&#9660;')+(f.changeRate||0).toFixed(2)+'%</span></div>':'';
        return '<div class="fav-item"><div class="fav-info" onclick="send(\''+f.stockCode+' price\')"><div>'+(f.stockName||f.stockCode)+'</div>'+price+'</div><span class="fav-del" onclick="removeFavorite(\''+f.stockCode+'\')">&#10005;</span></div>'
    }).join('');
    document.getElementById('favList').innerHTML=html||'<div style="padding:12px;color:var(--text2);text-align:center;font-size:12px">No favorites yet</div>';
}
function addFavorite(){
    var code=document.getElementById('favInput').value.trim();
    if(!code)return;
    fetch('/api/favorite/add',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({stockCode:code})})
    .then(function(r){return r.json()}).then(function(data){
        if(data.success){document.getElementById('favInput').value='';loadFavorites()}
        else{alert(data.message||'Add failed')}
    })
}
function removeFavorite(code){
    fetch('/api/favorite/remove?code='+code,{method:'DELETE'}).then(function(r){return r.json()}).then(function(data){
        if(data.success)loadFavorites()
    })
}

// Input
input.addEventListener('keydown',function(e){
    if(e.key==='Enter'&&!e.shiftKey&&!e.isComposing){e.preventDefault();doSend()}
});
input.addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,100)+'px'});

function quickKline(){
    var code=prompt('Enter stock code (e.g. 600519, AAPL):','600519');
    if(!code)return;
    directKline(code.trim());
}

function directKline(code){
    var end=new Date().toISOString().split('T')[0];
    var start=new Date(Date.now()-90*86400000).toISOString().split('T')[0];
    if(welcome)welcome.style.display='none';
    appendMsg('user','K-Line: '+code);
    var loadEl=appendLoading();
    fetch('/api/stock/kline?code='+code+'&startDate='+start+'&endDate='+end+'&limit=120')
    .then(function(r){return r.json()}).then(function(data){
        loadEl.remove();
        if(data.success&&data.data.length>0){
            renderKlineChart(code,data.data);
            document.getElementById('klineModal').classList.add('show');
            appendMsg('ai','K-Line loaded: '+code+' ('+data.data.length+' days, with MA5/MA10/MA20)');
        }else{
            appendMsg('ai','No K-Line data for '+code);
        }
    }).catch(function(e){loadEl.remove();appendMsg('ai','K-Line Error: '+e.message)});
}

function send(text){
    if(text.indexOf('K-Line')!==-1||text.indexOf('K-line')!==-1||text.indexOf('k-line')!==-1){
        var m=text.match(/(\d{6}|[A-Z]{1,5})/);
        if(m){directKline(m[1]);return}
    }
    input.value=text;doSend()
}

function doSend(){
    var msg=input.value.trim();
    if(!msg||loading)return;
    if(welcome)welcome.style.display='none';
    appendMsg('user',msg);
    input.value='';input.style.height='auto';
    loading=true;sendBtn.disabled=true;

    var aiDiv=document.createElement('div');
    aiDiv.className='msg ai';
    aiDiv.innerHTML='<div class="msg-avatar">&#129302;</div><div class="msg-bubble"><span class="stream-cursor"></span></div>';
    chatArea.appendChild(aiDiv);
    scrollToBottom();
    var bubble=aiDiv.querySelector('.msg-bubble');
    var fullText='';

    fetch('/api/chat/stream',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({message:msg})})
    .then(function(res){
        if(!res.ok)throw new Error('HTTP '+res.status);
        var reader=res.body.getReader();
        var decoder=new TextDecoder();
        var buffer='';
        function read(){
            return reader.read().then(function(result){
                if(result.done){
                    finalizeStream(bubble,fullText,msg);
                    return;
                }
                buffer+=decoder.decode(result.value,{stream:true});
                var lines=buffer.split('\n');
                buffer=lines.pop();
                for(var i=0;i<lines.length;i++){
                    var line=lines[i].trim();
                    if(line.indexOf('data:')===0){
                        var data=line.substring(5).trim();
                        if(data){
                            fullText+=data;
                            renderStreamChunk(bubble,fullText);
                        }
                    }
                }
                return read();
            });
        }
        return read();
    }).catch(function(e){
        if(e.name==='AbortError'){bubble.innerHTML='<span style="color:var(--text2)">Timeout - please retry</span>'}
        else{bubble.innerHTML='<span style="color:var(--red)">Error: '+escapeHtml(e.message)+'</span>'}
    }).finally(function(){loading=false;sendBtn.disabled=false;input.focus()})
}
function renderStreamChunk(bubble,text){
    var cursor='<span class="stream-cursor"></span>';
    bubble.innerHTML=marked.parse(text)+cursor;
    scrollToBottom();
}
function finalizeStream(bubble,text,msg){
    bubble.innerHTML=marked.parse(text);
    scrollToBottom();
    if(text)checkForKline(msg,text);
}

function appendMsg(role,content,scroll){
    var div=document.createElement('div');
    div.className='msg '+role;
    var rendered=role==='user'?escapeHtml(content).replace(/\n/g,'<br>'):marked.parse(content);
    div.innerHTML='<div class="msg-avatar">'+(role==='user'?'&#128100;':'&#129302;')+'</div><div class="msg-bubble">'+rendered+'</div>';
    chatArea.appendChild(div);
    if(scroll!==false)scrollToBottom()
}
function appendLoading(){
    var div=document.createElement('div');
    div.className='msg ai';
    div.innerHTML='<div class="msg-avatar">&#129302;</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
    chatArea.appendChild(div);scrollToBottom();return div
}
function escapeHtml(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function scrollToBottom(){chatArea.scrollTop=chatArea.scrollHeight}

function checkForKline(q,a){
    if(a.indexOf('|')!==-1&&(a.indexOf('\u5f00\u76d8')!==-1)&&(a.indexOf('\u6536\u76d8')!==-1)){
        var klines=parseKlineFromText(a);
        if(klines.length>0){
            var m=a.match(/[\uff08(](\d{6})[\uff09)]/);
            if(!m)m=q.match(/(\d{6})/);
            var code=m?m[1]:'Stock';
            renderKlineChart(code,klines);
            document.getElementById('klineModal').classList.add('show')
        }
    }
}
function parseKlineFromText(text){
    var klines=[];
    var lines=text.split('\n');
    for(var i=0;i<lines.length;i++){
        var line=lines[i];
        if(line.indexOf('|')===-1)continue;
        var parts=line.split('|').map(function(s){return s.trim()}).filter(function(s){return s});
        if(parts.length>=5){
            var date=parts[0];
            if(/^\d{4}-\d{2}-\d{2}$/.test(date)){
                klines.push({date:date,open:parts[1],close:parts[2],high:parts[3],low:parts[4]})
            }
        }
    }
    return klines
}

// K-Line Chart with MA5/MA10/MA20
function calcMA(data,n){
    var result=[];
    for(var i=0;i<data.length;i++){
        if(i<n-1){result.push('-');continue}
        var sum=0;
        for(var j=0;j<n;j++)sum+=data[i-j];
        result.push((sum/n).toFixed(2))
    }
    return result
}

function renderKlineChart(code,klines){
    document.getElementById('klineTitle').textContent=code+' K-Line Chart';
    var chart=echarts.init(document.getElementById('klineChart'));
    var dates=klines.map(function(k){return k.date});
    var closePrices=klines.map(function(k){return parseFloat(k.close)});
    var ma5=calcMA(closePrices,5);
    var ma10=calcMA(closePrices,10);
    var ma20=calcMA(closePrices,20);
    chart.setOption({
        backgroundColor:'#161b22',
        tooltip:{trigger:'axis',axisPointer:{type:'cross'},backgroundColor:'rgba(22,27,34,0.9)',borderColor:'#30363d',textStyle:{color:'#e6edf3',fontSize:12}},
        legend:{data:['K-Line','MA5','MA10','MA20'],textStyle:{color:'#8b949e',fontSize:11},top:5},
        grid:{left:60,right:60,top:40,bottom:60},
        xAxis:{type:'category',data:dates,axisLine:{lineStyle:{color:'#30363d'}},axisLabel:{color:'#8b949e',fontSize:10}},
        yAxis:{type:'value',scale:true,splitLine:{lineStyle:{color:'#21262d'}},axisLabel:{color:'#8b949e'}},
        dataZoom:[{type:'inside',start:0,end:100},{type:'slider',start:0,end:100,height:20,bottom:10,borderColor:'#30363d',fillerColor:'rgba(88,166,255,0.15)',handleStyle:{color:'#58a6ff'},textStyle:{color:'#8b949e'}}],
        series:[
            {name:'K-Line',type:'candlestick',data:klines.map(function(k){return [+k.open,+k.close,+k.low,+k.high]}),
             itemStyle:{color:'#f85149',color0:'#3fb950',borderColor:'#f85149',borderColor0:'#3fb950'}},
            {name:'MA5',type:'line',data:ma5,smooth:true,lineStyle:{width:1,color:'#f0c040'},symbol:'none'},
            {name:'MA10',type:'line',data:ma10,smooth:true,lineStyle:{width:1,color:'#58a6ff'},symbol:'none'},
            {name:'MA20',type:'line',data:ma20,smooth:true,lineStyle:{width:1,color:'#bc8cff'},symbol:'none'}
        ]
    });
    window.addEventListener('resize',function(){chart.resize()})
}

function closeModal(){document.getElementById('klineModal').classList.remove('show')}
document.getElementById('klineModal').addEventListener('click',function(e){if(e.target.classList.contains('modal-overlay'))closeModal()});
    </script>
